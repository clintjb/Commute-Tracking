name: Commute Dashboard

on:
  schedule:
    - cron: '5 10 * * 1-5'
    - cron: '5 21 * * 1-5'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas numpy plotly gspread google-auth tweepy

      - name: Restore Tweet Sent Log
        uses: actions/cache@v4
        with:
          path: tweet_sent_log.json
          key: tweet-sent-log-${{ github.ref }}
          restore-keys: tweet-sent-log-

      - name: Fetch CSV & Check For Fresh Data
        id: fetch
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID:             ${{ secrets.GOOGLE_SHEET_ID }}
        run: python fetch_data.py

      # Skip All If No Fresh Data Found
      # Dashboard

      - name: Generate Dashboard
        if: steps.fetch.outputs.fresh == 'true'
        run: python dashboard.py

      - name: Save Backups To Repo
        if: steps.fetch.outputs.fresh == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "Commute Tracker - Metrics.csv" dashboard.html kpi.html

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Backup: CSV + dashboard HTML"
            git push
          fi

      - name: Push HTML To clintjb.github.io
        if: steps.fetch.outputs.fresh == 'true'
        env:
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          git clone https://x-access-token:${PERSONAL_ACCESS_TOKEN}@github.com/clintjb/clintjb.github.io.git target_repo

          cp dashboard.html target_repo/_includes/commute_dashboard.html
          cp kpi.html       target_repo/_includes/commute_kpi.html

          cd target_repo
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _includes/commute_dashboard.html _includes/commute_kpi.html

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Updated Commute Dashboard"
            git push
          fi

      # Tweet

      - name: Maybe tweet
        if: steps.fetch.outputs.fresh == 'true'
        env:
          X_API_KEY:             ${{ secrets.X_API_KEY }}
          X_API_SECRET:          ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:        ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: python tweet.py

      # Save Tweet Log Back To Cache

      - name: Save tweet sent log
        if: steps.fetch.outputs.fresh == 'true'
        uses: actions/cache@v4
        with:
          path: tweet_sent_log.json
          key: tweet-sent-log-${{ github.ref }}-${{ github.run_id }}
